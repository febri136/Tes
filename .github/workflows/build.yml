name: Build postmarketOS msm89x7 Nightly

on:
  workflow_dispatch: # Memicu build secara manual lewat tab Actions
  schedule:
    - cron: '0 2 * * 5' # Otomatis build setiap hari Jumat jam 02:00 UTC

jobs:
  build-image:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git python3 openssl qemu-user-static

    - name: Install pmbootstrap from Official Git
      run: |
        # Mengunduh dari server mandiri resmi postmarketOS
        git clone --depth=1 https://postmarketos.org
        
        # Membuat folder lokal bin di runner GitHub
        mkdir -p ~/.local/bin
        
        # Membuat tautan simbolis (symlink) ke berkas eksekusi utama
        ln -s "$PWD/pmbootstrap/pmbootstrap.py" ~/.local/bin/pmbootstrap
        
        # Memasukkan path ke environment GitHub agar perintah 'pmbootstrap' bisa dipanggil global
        echo "$HOME/.local/bin" >> $GITHUB_PATH

    - name: Verify pmbootstrap Installation
      run: |
        # Memastikan pmbootstrap terpasang dengan benar dan menampilkan versi
        pmbootstrap --version

    - name: Initialize pmbootstrap Configuration
      run: |
        # Konfigurasi otomatis non-interaktif untuk platform qcom-msm89x7 (Edge Channel)
        pmbootstrap init \
          --path=./pmbootstrap_root \
          --work=./pmbootstrap_work \
          --arch=aarch64 \
          --vendor=qualcomm \
          --device=qcom-msm89x7 \
          --ui=phosh \
          --channel=edge \
          --mirror=http://alpinelinux.org

    - name: Zap and Pull Mainline Packages
      run: |
        # Memperbarui indeks paket pmaports ke kondisi paling segar
        pmbootstrap pull

    - name: Build Rootfs Image
      run: |
        # Proses pembuatan citra sistem operasi tanpa enkripsi awal (FDE)
        pmbootstrap install --no-fde

    - name: Export Deployment Images
      run: |
        mkdir -p ./output_artifacts
        # Pindahkan hasil kompilasi citra (img) ke folder output
        pmbootstrap export --output=./output_artifacts

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: postmarketOS-qcom-msm89x7-edge
        path: ./output_artifacts/*
        
