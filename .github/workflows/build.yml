name: Build postmarketOS msm89x7 Nightly

on:
  workflow_dispatch: # Memicu build secara manual lewat tab Actions
  schedule:
    - cron: '0 2 * * 5' # Otomatis build setiap hari Jumat jam 02:00 UTC

jobs:
  build-image:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git python3 openssl qemu-user-static

    - name: Install pmbootstrap from Official Git
      run: |
        # Mengunduh langsung dari server utama postmarketOS
        git clone --depth=1 https://gitlab.postmarketos.org/postmarketOS/pmbootstrap.git
        
        # Membuat folder lokal bin di runner GitHub
        mkdir -p ~/.local/bin
        
        # Membuat symlink yang mengarah tepat ke file eksekusi
        ln -s "$PWD/pmbootstrap/pmbootstrap.py" ~/.local/bin/pmbootstrap
        
        # Memasukkan path lokal ke dalam sistem environment GitHub Actions
        echo "$HOME/.local/bin" >> $GITHUB_PATH

    - name: Verify pmbootstrap Installation
      run: |
        # Memastikan pmbootstrap terpasang dengan benar dan menampilkan versi
        pmbootstrap --version

    - name: Generate pmbootstrap v3 Configuration File
      run: |
        # Membuat direktori konfigurasi default global pmbootstrap jika belum ada
        mkdir -p ~/.config
        
        # Menulis langsung file pmbootstrap_v3.cfg dengan format standar v3 yang valid
        cat <<EOF > ~/.config/pmbootstrap_v3.cfg
        [pmbootstrap]
        version = 3
        aports = $GITHUB_WORKSPACE/pmbootstrap_root/pmaports
        work = $GITHUB_WORKSPACE/pmbootstrap_work
        jobs = 4
        ccache_size = 5G
        channel = edge
        vendor = qualcomm
        device = qcom-msm89x7
        ui = phosh
        user = pmos
        lang = en_US.UTF-8
        timezone = UTC
        hostname = qcom-msm89x7
        mirror_alpine = http://alpinelinux.org
        mirror_pmos = http://postmarketos.org
        is_default_channel = False
        EOF

    - name: Zap and Pull Mainline Packages
      run: |
        # Memperbarui pmaports ke kondisi paling segar sesuai konfigurasi file v3 di atas
        pmbootstrap pull

    - name: Build Rootfs Image
      run: |
        # Proses pembuatan citra sistem operasi tanpa enkripsi awal (FDE)
        pmbootstrap install --no-fde

    - name: Export Deployment Images
      run: |
        mkdir -p ./output_artifacts
        # Mengekspor hasil kompilasi citra (img) ke folder output
        pmbootstrap export --output=./output_artifacts

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: postmarketOS-qcom-msm89x7-edge
        path: ./output_artifacts/*
        
