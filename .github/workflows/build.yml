name: Build postmarketOS msm89x7 Nightly

on:
  workflow_dispatch: # Memicu build secara manual lewat tab Actions
  schedule:
    - cron: '0 2 * * 5' # Otomatis build setiap hari Jumat jam 02:00 UTC

jobs:
  build-image:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git python3 openssl qemu-user-static

    - name: Setup pmbootstrap Tool
      run: |
        # Mengunduh langsung melalui repositori biner resmi GitLab PostmarketOS
        git clone --depth=1 https://postmarketos.org
        
        # Mendaftarkan path global agar perintah 'pmbootstrap' langsung aktif di step berikutnya
        echo "$GITHUB_WORKSPACE/pmbootstrap" >> $GITHUB_PATH

    - name: Verify pmbootstrap Installation
      run: |
        # Memastikan aplikasi merespon dengan benar
        python3 pmbootstrap/pmbootstrap.py --version

    - name: Generate pmbootstrap v3 Configuration
      run: |
        # Membuat folder konfigurasi rahasia global
        mkdir -p ~/.config
        
        # Membuat file konfigurasi v3 yang mutlak presisi menggunakan skrip otomatis python
        python3 -c "
        import os
        config_content = '''[pmbootstrap]
        aports = {ws}/pmbootstrap_root/pmaports
        version = 3
        work = {ws}/pmbootstrap_work
        jobs = 4
        ccache_size = 5G
        channel = edge
        vendor = qualcomm
        device = qcom-msm89x7
        ui = phosh
        user = pmos
        lang = en_US.UTF-8
        timezone = UTC
        hostname = qcom-msm89x7
        mirror_alpine = http://alpinelinux.org
        mirror_pmos = http://postmarketos.org
        is_default_channel = False
        '''.format(ws=os.environ['GITHUB_WORKSPACE'])
        
        with open(os.path.expanduser('~/.config/pmbootstrap_v3.cfg'), 'w') as f:
            f.write(config_content)
        "

    - name: Zap and Pull Mainline Packages
      run: |
        # Sinkronisasi repositori pmaports ke kondisi paling mutakhir
        python3 pmbootstrap/pmbootstrap.py pull

    - name: Build Rootfs Image
      run: |
        # Mulai proses perakitan citra sistem operasi msm89x7 secara penuh
        python3 pmbootstrap/pmbootstrap.py install --no-fde

    - name: Export Deployment Images
      run: |
        mkdir -p ./output_artifacts
        # Memindahkan file hasil biner bauran (.img) ke folder keluaran
        python3 pmbootstrap/pmbootstrap.py export --output=./output_artifacts

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: postmarketOS-qcom-msm89x7-edge
        path: ./output_artifacts/*
        
