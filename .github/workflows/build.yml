name: Build postmarketOS msm89x7 Nightly

on:
  workflow_dispatch: # Memicu build secara manual lewat tab Actions
  schedule:
    - cron: '0 2 * * 5' # Otomatis build setiap hari Jumat jam 02:00 UTC

jobs:
  build-image:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git python3 openssl qemu-user-static

    - name: Install pmbootstrap from Official Git
      run: |
        # Mengunduh langsung dari server utama postmarketOS
        git clone --depth=1 https://gitlab.postmarketos.org/postmarketOS/pmbootstrap.git
        
        # MEMASUKKAN PATH: Daftarkan folder pmbootstrap ke dalam environment path GitHub Actions
        echo "$GITHUB_WORKSPACE/pmbootstrap" >> $GITHUB_PATH

    - name: Verify pmbootstrap Installation
      run: |
        # MEMANGGIL LANGSUNG: Menggunakan python3 agar modul internal pmbootstrap terbaca sempurna
        python3 pmbootstrap/pmbootstrap.py --version

    - name: Generate pmbootstrap v3 Configuration File
      run: |
        # REVISI: Menyertakan flag global '--as-root' setelah nama skrip agar lolos dari verifikasi root pmbootstrap (sudo -E dihapus)
        yes "" | python3 pmbootstrap/pmbootstrap.py --as-root init || true

        # REVISI TOTAL (METODE INJEKSI TEKS): Menimpa berkas pmbootstrap_v3.cfg secara mandiri
        # Pastikan bwrap tetap False untuk meringankan kerja kontainer
        cat <<EOF > ~/.config/pmbootstrap_v3.cfg
        [pmbootstrap]
        version = 3
        aports = /home/runner/.local/var/pmbootstrap/cache_git/pmaports
        work = /home/runner/.local/var/pmbootstrap
        jobs = 4
        ccache_size = 5G
        channel = edge
        device = qcom-msm89x7
        ui = plasma-mobile
        user = pmos
        lang = en_US.UTF-8
        timezone = UTC
        hostname = qcom-msm89x7
        is_default_channel = False
        bwrap = False

        [mirrors]
        mirrors.alpine = http://alpinelinux.org
        mirrors.pmaports = http://postmarketos.org
        EOF

        # Menyelaraskan konfigurasi sub-sistem internal ke unit Plasma Mobile menggunakan argumen global '--as-root' yang benar
        python3 pmbootstrap/pmbootstrap.py --as-root config device qcom-msm89x7
        python3 pmbootstrap/pmbootstrap.py --as-root config ui plasma-mobile

    - name: Zap and Pull Mainline Packages
      run: |
        # Menjalankan sinkronisasi repositori pmaports dengan parameter global '--as-root'
        python3 pmbootstrap/pmbootstrap.py --as-root zap
        python3 pmbootstrap/pmbootstrap.py --as-root pull

    - name: Build Rootfs Image
      run: |
        # PERBAIKAN STRUKTUR: Meletakkan '--as-root' sebagai argumen global di depan, diikuti sub-perintah install
        # Langkah ini sukses memotong pemanggilan 'busybox su pmos' yang diblokir kontainer virtual GitHub Actions
        python3 pmbootstrap/pmbootstrap.py --as-root install --no-fde --password 000

    - name: Export Deployment Images
      run: |
        mkdir -p ./output_artifacts
        # Mengekspor hasil kompilasi citra (img) ke folder output dengan argumen global '--as-root'
        python3 pmbootstrap/pmbootstrap.py --as-root export --output=./output_artifacts

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: postmarketOS-qcom-msm89x7-edge-plasma
        path: ./output_artifacts/*
        
