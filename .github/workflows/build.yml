name: Build postmarketOS msm89x7 Duranium Nightly

on:
  workflow_dispatch: # Memicu build secara manual lewat tab Actions
  schedule:
    - cron: '0 2 * * 5' # Otomatis build setiap hari Jumat jam 02:00 UTC

jobs:
  build-image:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Install System Dependencies & mkosi
      run: |
        sudo apt-get update
        # Memasukkan 'mkosi' langsung melalui pengelola paket APT Ubuntu agar terhindar dari isu PyPI kosong
        sudo apt-get install -y git python3 python3-pip python3-setuptools openssl systemd-container arch-install-scripts mkosi

    - name: Set up QEMU with Fix Binary (Solusi Bypass Galat Exit Code 125)
      uses: docker/setup-qemu-action@v3
      with:
        platforms: arm64
        fix-binary: true

    - name: Clone Official Duranium Build Repository
      run: |
        # Mengunduh dari jalur resmi GitLab postmarketOS
        git clone --depth=1 https://gitlab.postmarketos.org/postmarketOS/duranium-build.git

    - name: Sanitize All Upstream Configs Recursively (Bypass Distribution Validation Error)
      run: |
        cd duranium-build
        # SOLUSI TOTAL: Menghapus baris repositori/distribusi kustom 'postmarketos=' di SEMUA file .conf secara rekursif
        find . -type f -name "*.conf" -exec sed -i '/postmarketos=/d' {} +
        find . -type f -name "*.conf" -exec sed -i 's/Distribution=postmarketos/Distribution=alpine/g' {} +

    - name: Configure Duranium Profile for MSM89x7
      run: |
        cd duranium-build
        # Membuat direktori konfigurasi lokal mkosi khusus profil perangkat
        mkdir -p mkosi.local.d
        
        # Memaksa mkosi membaca skema repositori sebagai bagian dari distribusi 'alpine' resmi
        cat <<EOF > mkosi.local.d/msm89x7.conf
        [Build]
        Architecture=aarch64

        [Content]
        Distribution=alpine
        Repositories=
            alpine-main=http://alpinelinux.org
            alpine-community=http://alpinelinux.org
            alpine-postmarketos=http://postmarketos.org
        Packages=
            linux-postmarketos-qcom-msm89x7
            firmware-qcom-msm89x7
            lk2nd
            postmarketos-ui-plasma-mobile
        EOF

    - name: Inject Configuration via Duranium Confext Architecture
      run: |
        cd duranium-build
        # Menghasilkan password hash '147147' menggunakan openssl
        PASS_HASH=$(openssl passwd -6 "147147")
        
        # Karena duranium memisahkan /etc ke dalam sub-image duranium-base-config, 
        # Kita harus menyuntikkan postinst ke skrip finalisasi pembentukan konfigurasi dasar (confext)
        mkdir -p mkosi.images/base/
        cat <<EOF > mkosi.images/base/mkosi.postinst
        #!/bin/sh
        # Menambahkan konfigurasi user di lingkungan internal base image confext
        echo "user:x:10000:" >> \$BUILDROOT/etc/group
        echo "wheel:x:10:" >> \$BUILDROOT/etc/group
        echo "audio:x:18:" >> \$BUILDROOT/etc/group
        echo "video:x:27:" >> \$BUILDROOT/etc/group
        
        echo "user:x:10000:10000:postmarketOS User:/home/user:/bin/sh" >> \$BUILDROOT/etc/passwd
        echo "user:\${PASS_HASH}:19500:0:99999:7:::" >> \$BUILDROOT/etc/shadow
        
        mkdir -p \$BUILDROOT/home/user
        chown -R 10000:10000 \$BUILDROOT/home/user
        EOF
        
        chmod +x mkosi.images/base/mkosi.postinst

    - name: Execute Duranium Build Engine via mkosi
      run: |
        cd duranium-build
        # Memulai perakitan citra sistem operasi menggunakan mkosi sistem bawaan APT
        sudo mkosi build

    - name: Prepare Workspace Artifacts
      run: |
        # Mengamankan seluruh berkas gambar keluaran dari direktori internal mkosi output
        mkdir -p $GITHUB_WORKSPACE/duranium-output
        cp -r duranium-build/mkosi.output/* $GITHUB_WORKSPACE/duranium-output/ || true

    - name: Upload Duranium Immutable Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: postmarketOS-duranium-qcom-msm89x7-plasma-mobile
        path: ${{ github.workspace }}/duranium-output/*
        retention-days: 7
        
